<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; margin-top: 0; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; font-size: 0.9em; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; background: #fafafa; }
        input:focus, select:focus { outline: none; border-color: #3498db; background: #fff; }
        button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; min-height: 20px; font-size: 0.95em; }
        .calc-box { background: #e8f4f8; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #3498db; }
    </style>
</head>
<body>

<div class="card">
    <h2>Record Expense</h2>
    <form id="expenseForm">
        <label>Date</label>
        <input type="date" id="date" required>
        
        <label>Category</label>
        <select id="category">
            <option value="Food">Food</option>
            <option value="Collection">Collection</option>
            <option value="Grocery">Grocery</option>
            <option value="Subscription">Subscription</option>
            <option value="Rental">Rental / Bills</option>
            <option value="Loan">Loan</option>
        </select>

        <label>Currency</label>
        <select id="currency">
            <option value="MYR">MYR (Ringgit)</option>
            <option value="USD">USD (US Dollar)</option>
            <option value="KHR">KHR (Cambodian Riel)</option>
        </select>

        <div id="foreignSection" class="calc-box" style="display: none;">
            <label>Foreign Amount</label>
            <input type="number" step="0.01" id="foreignAmount" placeholder="0.00">
            
            <label>Exchange Rate (to 1 MYR)</label>
            <input type="number" step="0.000001" id="exchangeRate" placeholder="e.g. 4.72 or 0.0011">
        </div>
        
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Lunch, Scizor Promo..." required>
        
        <label>Total Amount (MYR)</label>
        <input type="number" step="0.01" id="amount" placeholder="0.00" required>
        
        <label>Payment Method</label>
        <select id="method">
            <option value="Debit Card (Wise)">Debit Card (Wise)</option>
            <option value="Debit Card (HLB)">Debit Card (HLB)</option>
            <option value="Touch n'Go">Touch n'Go</option>
            <option value="Credit Card">Credit Card</option>
        </select>

        <label>Remark (Optional)</label>
        <input type="text" id="remark" placeholder="e.g. Utility Fee, Split with friend...">

        <button type="submit" id="submitBtn">Save to Sheets</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // --- REPLACE THIS WITH YOUR APPS SCRIPT URL ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbydpRx2O_R6W0m-9ZowLmekJTnKjRTPr-YfyO_mYOE3Nw6PieXM6nTVZYxBJRClqKdL/exec'; 
    
    const form = document.getElementById('expenseForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    
    const currency = document.getElementById('currency');
    const foreignSection = document.getElementById('foreignSection');
    const foreignAmount = document.getElementById('foreignAmount');
    const exchangeRate = document.getElementById('exchangeRate');
    const amountMYR = document.getElementById('amount');

    document.getElementById('date').valueAsDate = new Date();

    // Toggle Currency fields
    currency.addEventListener('change', () => {
        if (currency.value === 'MYR') {
            foreignSection.style.display = 'none';
            amountMYR.readOnly = false;
            foreignAmount.value = '';
            exchangeRate.value = '';
        } else {
            foreignSection.style.display = 'block';
            amountMYR.readOnly = true; 
            amountMYR.value = '';
        }
    });

    // Auto-calculate MYR
    function calculateTotal() {
        if (currency.value !== 'MYR') {
            const fAmount = parseFloat(foreignAmount.value) || 0;
            const rate = parseFloat(exchangeRate.value) || 0;
            amountMYR.value = (fAmount * rate).toFixed(2);
        }
    }

    foreignAmount.addEventListener('input', calculateTotal);
    exchangeRate.addEventListener('input', calculateTotal);

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        status.style.color = "#333";
        status.innerText = "Syncing to Google Sheets...";

        // Handle the Remark field logic
        let userRemark = document.getElementById('remark').value.trim();
        let finalRemark = userRemark;
        
        if (currency.value !== 'MYR') {
            const fAmount = document.getElementById('foreignAmount').value;
            const rate = document.getElementById('exchangeRate').value;
            const currencyNote = `[${fAmount} ${currency.value} @ ${rate}]`;
            
            // Combine user notes with currency notes if both exist
            finalRemark = userRemark ? `${userRemark} | ${currencyNote}` : currencyNote;
        }

        const data = {
            date: document.getElementById('date').value,
            category: document.getElementById('category').value,
            desc: document.getElementById('desc').value,
            amount: document.getElementById('amount').value,
            method: document.getElementById('method').value,
            remark: finalRemark // Sends the merged remark
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            status.style.color = "#27ae60";
            status.innerText = "Success! Expense recorded.";
            form.reset();
            document.getElementById('date').valueAsDate = new Date(); 
            foreignSection.style.display = 'none';
            amountMYR.readOnly = false;
            setTimeout(() => { status.innerText = ""; }, 3000); 
            btn.disabled = false;
        })
        .catch(error => {
            status.style.color = "#c0392b";
            status.innerText = "Error saving data.";
            console.error('Error!', error);
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
